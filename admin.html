<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>근골격계 증상조사 - 관리자</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root{--bg:#f0f4ff;--surface:#fff;--border:#dde3f0;--accent:#2563eb;--accent2:#7c3aed;--alight:rgba(37,99,235,0.07);--green:#10b981;--red:#ef4444;--yellow:#f59e0b;--text:#1e293b;--text2:#64748b;--r:14px;--sh:0 4px 20px rgba(37,99,235,0.07);}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* ── 로그인 ── */
#loginScreen{position:fixed;inset:0;background:linear-gradient(135deg,#1e3a8a,#7c3aed);display:flex;align-items:center;justify-content:center;z-index:9999;}
.login-box{background:#fff;border-radius:20px;padding:40px 36px;width:340px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.25);}
.login-logo{font-size:40px;margin-bottom:12px;}
.login-title{font-size:18px;font-weight:900;margin-bottom:4px;}
.login-sub{font-size:12px;color:var(--text2);margin-bottom:28px;}
.login-inp{width:100%;padding:13px 16px;border:1.5px solid var(--border);border-radius:10px;font-size:15px;font-family:'Noto Sans KR',sans-serif;outline:none;margin-bottom:12px;text-align:center;letter-spacing:4px;}
.login-inp:focus{border-color:var(--accent);}
.login-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
.login-err{color:var(--red);font-size:12px;margin-top:8px;display:none;}

/* ── 헤더 ── */
.header{background:linear-gradient(135deg,#1e3a8a,#7c3aed);color:#fff;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 4px 16px rgba(0,0,0,0.15);}
.header-left{display:flex;align-items:center;gap:10px;}
.header-title{font-size:17px;font-weight:900;}
.header-badge{background:rgba(255,255,255,0.2);padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;}
.logout-btn{padding:8px 14px;background:rgba(255,255,255,0.15);color:#fff;border:1px solid rgba(255,255,255,0.3);border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}

/* ── 메인 ── */
#adminMain{display:none;padding:20px;}
.max-w{max-width:1200px;margin:0 auto;}

/* ── 통계 카드 ── */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:20px;}
.stat-card{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:16px;box-shadow:var(--sh);text-align:center;}
.stat-num{font-size:28px;font-weight:900;}
.stat-label{font-size:11px;color:var(--text2);margin-top:4px;}
.c-blue{color:var(--accent);}
.c-red{color:var(--red);}
.c-green{color:var(--green);}
.c-yellow{color:var(--yellow);}
.c-purple{color:var(--accent2);}

/* ── 차트 영역 ── */
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;}
.chart-card{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:18px;box-shadow:var(--sh);}
.chart-title{font-size:13px;font-weight:800;margin-bottom:14px;color:var(--text);}
@media(max-width:700px){.chart-grid{grid-template-columns:1fr;}}

/* ── 툴바 ── */
.toolbar{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:14px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;box-shadow:var(--sh);}
.tb-inp{padding:9px 13px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:'Noto Sans KR',sans-serif;outline:none;min-width:140px;flex:1;}
.tb-inp:focus{border-color:var(--accent);}
.tb-select{padding:9px 13px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:'Noto Sans KR',sans-serif;outline:none;background:#fff;cursor:pointer;}
.tb-btn{padding:9px 16px;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;white-space:nowrap;}
.tb-search{background:var(--accent);color:#fff;}
.tb-reset{background:#f1f5f9;color:var(--text2);}
.tb-csv{background:var(--green);color:#fff;}
.tb-refresh{background:var(--alight);color:var(--accent);border:1px solid var(--accent);}

/* ── 테이블 ── */
.tbl-wrap{background:#fff;border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;margin-bottom:14px;}
.tbl-header{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
.tbl-count{font-size:13px;font-weight:700;color:var(--text2);}
.tbl-scroll{overflow-x:auto;}
table{width:100%;border-collapse:collapse;min-width:900px;}
thead tr{background:linear-gradient(135deg,var(--accent),var(--accent2));}
thead th{padding:11px 13px;font-size:11px;font-weight:700;color:#fff;text-align:left;white-space:nowrap;cursor:pointer;user-select:none;}
thead th:hover{background:rgba(255,255,255,0.1);}
thead th .sort-icon{margin-left:4px;opacity:0.6;}
tbody tr{border-bottom:1px solid var(--border);transition:.15s;cursor:pointer;}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:#f0f4ff;}
tbody td{padding:10px 13px;font-size:12px;color:var(--text);vertical-align:middle;}
.td-name{font-weight:800;font-size:13px;}
.td-date{color:var(--text2);font-size:11px;white-space:nowrap;}

/* 배지 */
.badge{display:inline-block;padding:3px 8px;border-radius:10px;font-size:10px;font-weight:700;white-space:nowrap;}
.badge-pain{background:rgba(239,68,68,0.1);color:#dc2626;}
.badge-ok{background:rgba(16,185,129,0.1);color:#059669;}
.badge-none{background:#f1f5f9;color:var(--text2);}
.badge-b1{background:rgba(16,185,129,0.1);color:#059669;}
.badge-b2{background:rgba(37,99,235,0.1);color:var(--accent);}
.badge-b3{background:rgba(245,158,11,0.1);color:#d97706;}
.badge-b4{background:rgba(239,68,68,0.1);color:#dc2626;}
.part-tag{display:inline-block;padding:2px 6px;border-radius:6px;font-size:10px;font-weight:600;background:rgba(239,68,68,0.08);color:#dc2626;margin:1px;}

/* ── 상세 드로어 ── */
#drawer{position:fixed;top:0;right:-480px;width:480px;max-width:100vw;height:100vh;background:#fff;box-shadow:-8px 0 40px rgba(0,0,0,0.15);z-index:500;transition:right .3s cubic-bezier(.4,0,.2,1);overflow-y:auto;}
#drawer.open{right:0;}
#drawerBackdrop{position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:499;display:none;}
#drawerBackdrop.open{display:block;}
.drawer-hd{padding:18px 20px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;}
.drawer-title{font-size:15px;font-weight:900;}
.drawer-close{background:rgba(255,255,255,0.2);border:none;color:#fff;padding:7px 12px;border-radius:8px;cursor:pointer;font-size:14px;}
.drawer-body{padding:18px 20px;}
.d-section{margin-bottom:18px;}
.d-section-title{font-size:11px;font-weight:800;color:var(--accent);background:var(--alight);padding:4px 10px;border-radius:6px;display:inline-block;margin-bottom:8px;}
.d-row{display:flex;gap:8px;padding:5px 0;border-bottom:1px solid #f1f5f9;font-size:12px;}
.d-row:last-child{border-bottom:none;}
.dk{font-weight:700;color:var(--text);min-width:90px;flex-shrink:0;}
.dv{color:var(--text2);word-break:break-all;}

/* ── 페이지네이션 ── */
.pagination{display:flex;align-items:center;justify-content:center;gap:6px;padding:12px;}
.pg-btn{padding:7px 12px;border:1.5px solid var(--border);border-radius:8px;background:#fff;color:var(--text2);font-size:12px;font-weight:700;cursor:pointer;}
.pg-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.pg-btn:disabled{opacity:.4;cursor:default;}

/* ── 로딩 ── */
#loadingBar{position:fixed;top:0;left:0;width:0%;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent2));z-index:9998;transition:width .3s;}

/* 빈 상태 */
.empty-row td{text-align:center;padding:40px;color:var(--text2);}
</style>
</head>
<body>

<div id="loadingBar"></div>

<!-- ── 로그인 ── -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">🔐</div>
    <div class="login-title">관리자 로그인</div>
    <div class="login-sub">근골격계질환 증상조사표 관리자 페이지</div>
    <input id="pwInput" type="password" class="login-inp" placeholder="비밀번호" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">로그인</button>
    <div class="login-err" id="loginErr">비밀번호가 올바르지 않습니다.</div>
  </div>
</div>

<!-- ── 헤더 ── -->
<div class="header" id="adminHeader" style="display:none">
  <div class="header-left">
    <span style="font-size:22px">🦴</span>
    <div>
      <div class="header-title">근골격계 증상조사 관리자</div>
    </div>
    <div class="header-badge" id="totalBadge">- 건</div>
  </div>
  <button class="logout-btn" onclick="doLogout()">로그아웃</button>
</div>

<!-- ── 메인 ── -->
<div id="adminMain">
<div class="max-w">

  <!-- 통계 카드 -->
  <div class="stat-grid" id="statGrid">
    <div class="stat-card"><div class="stat-num c-blue" id="st-total">-</div><div class="stat-label">전체 제출</div></div>
    <div class="stat-card"><div class="stat-num c-red" id="st-pain">-</div><div class="stat-label">통증 경험자</div></div>
    <div class="stat-card"><div class="stat-num c-green" id="st-nopain">-</div><div class="stat-label">통증 없음</div></div>
    <div class="stat-card"><div class="stat-num c-yellow" id="st-heavy">-</div><div class="stat-label">매우 힘듦</div></div>
    <div class="stat-card"><div class="stat-num c-purple" id="st-today">-</div><div class="stat-label">오늘 제출</div></div>
  </div>

  <!-- 차트 -->
  <div class="chart-grid">
    <div class="chart-card">
      <div class="chart-title">📍 통증 부위 분포</div>
      <canvas id="chartParts" height="200"></canvas>
    </div>
    <div class="chart-card">
      <div class="chart-title">💪 육체적 부담 정도</div>
      <canvas id="chartBurden" height="200"></canvas>
    </div>
  </div>

  <!-- 툴바 -->
  <div class="toolbar">
    <input id="srchName" type="text" class="tb-inp" placeholder="🔍 이름 검색">
    <input id="srchDept" type="text" class="tb-inp" placeholder="🏢 부서 검색">
    <select id="srchPain" class="tb-select">
      <option value="">통증 전체</option>
      <option value="예">통증 있음</option>
      <option value="아니오">통증 없음</option>
    </select>
    <select id="srchBurden" class="tb-select">
      <option value="">부담 전체</option>
      <option value="전혀 힘들지 않음">전혀 힘들지 않음</option>
      <option value="견딜만 함">견딜만 함</option>
      <option value="약간 힘듦">약간 힘듦</option>
      <option value="매우 힘듦">매우 힘듦</option>
    </select>
    <button class="tb-btn tb-search" onclick="applyFilter()">검색</button>
    <button class="tb-btn tb-reset" onclick="resetFilter()">초기화</button>
    <button class="tb-btn tb-csv" onclick="downloadCSV()">⬇ CSV</button>
    <button class="tb-btn tb-refresh" onclick="loadData()">🔄 새로고침</button>
  </div>

  <!-- 테이블 -->
  <div class="tbl-wrap">
    <div class="tbl-header">
      <div class="tbl-count" id="tblCount">로딩 중...</div>
    </div>
    <div class="tbl-scroll">
      <table id="mainTable">
        <thead>
          <tr>
            <th onclick="sortBy('name')">이름 <span class="sort-icon">↕</span></th>
            <th onclick="sortBy('createdAt')">제출일시 <span class="sort-icon">↕</span></th>
            <th>성별</th>
            <th>연령</th>
            <th onclick="sortBy('dept')">부서 <span class="sort-icon">↕</span></th>
            <th>직종/작업</th>
            <th>육체적 부담</th>
            <th>통증 여부</th>
            <th>통증 부위</th>
            <th>가사노동</th>
          </tr>
        </thead>
        <tbody id="tblBody">
          <tr class="empty-row"><td colspan="10">데이터를 불러오는 중...</td></tr>
        </tbody>
      </table>
    </div>
    <div class="pagination" id="pagination"></div>
  </div>

</div>
</div>

<!-- ── 상세 드로어 ── -->
<div id="drawerBackdrop" onclick="closeDrawer()"></div>
<div id="drawer">
  <div class="drawer-hd">
    <div class="drawer-title" id="drawerTitle">상세 정보</div>
    <button class="drawer-close" onclick="closeDrawer()">✕ 닫기</button>
  </div>
  <div class="drawer-body" id="drawerBody"></div>
</div>

<script>
// ── 비밀번호 (원하시면 변경하세요) ──
var ADMIN_PW = 'admin1234';
var allData = [];
var filtered = [];
var currentPage = 1;
var pageSize = 20;
var sortKey = 'createdAt';
var sortAsc = false;
var chartParts, chartBurden;

var PART_ICON = {'목':'🙆','어깨':'🤷','팔/팔꿈치':'💪','손/손목/손가락':'✋','허리':'🧍','다리/발':'🦵'};
var BURDEN_CLASS = {'전혀 힘들지 않음':'badge-b1','견딜만 함':'badge-b2','약간 힘듦':'badge-b3','매우 힘듦':'badge-b4'};

/* ── 로그인 ── */
function doLogin() {
  var pw = document.getElementById('pwInput').value;
  if (pw === ADMIN_PW) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminHeader').style.display = 'flex';
    document.getElementById('adminMain').style.display = 'block';
    loadData();
  } else {
    document.getElementById('loginErr').style.display = 'block';
    document.getElementById('pwInput').value = '';
    document.getElementById('pwInput').focus();
  }
}
function doLogout() {
  if (confirm('로그아웃 하시겠습니까?')) location.reload();
}

/* ── 로딩바 ── */
function setLoading(v) {
  document.getElementById('loadingBar').style.width = v ? '70%' : '100%';
  if (!v) setTimeout(function(){ document.getElementById('loadingBar').style.width='0%'; }, 400);
}

/* ── 데이터 로드 ── */
function loadData() {
  setLoading(true);
  window._loadAdminFn && window._loadAdminFn();
}

/* ── 통계 업데이트 ── */
function updateStats(data) {
  var total = data.length;
  var pain  = data.filter(function(r){ return r.hasPain==='예'; }).length;
  var heavy = data.filter(function(r){ return r.physicalBurden==='매우 힘듦'; }).length;
  var today = data.filter(function(r){
    if (!r.createdAt) return false;
    var d = new Date(r.createdAt.seconds*1000);
    var now = new Date();
    return d.toDateString() === now.toDateString();
  }).length;
  document.getElementById('st-total').textContent  = total;
  document.getElementById('st-pain').textContent   = pain;
  document.getElementById('st-nopain').textContent = total - pain;
  document.getElementById('st-heavy').textContent  = heavy;
  document.getElementById('st-today').textContent  = today;
  document.getElementById('totalBadge').textContent = total + ' 건';
  drawCharts(data);
}

/* ── 차트 ── */
function drawCharts(data) {
  // 통증 부위
  var parts = ['목','어깨','팔/팔꿈치','손/손목/손가락','허리','다리/발'];
  var partCounts = parts.map(function(p){
    return data.filter(function(r){ return r.painParts && r.painParts.indexOf(p)>=0; }).length;
  });
  if (chartParts) chartParts.destroy();
  chartParts = new Chart(document.getElementById('chartParts'), {
    type:'bar',
    data:{
      labels: parts,
      datasets:[{
        label:'인원',
        data: partCounts,
        backgroundColor:['rgba(37,99,235,0.7)','rgba(124,58,237,0.7)','rgba(239,68,68,0.7)','rgba(245,158,11,0.7)','rgba(16,185,129,0.7)','rgba(99,102,241,0.7)'],
        borderRadius:6
      }]
    },
    options:{plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{stepSize:1}}}}
  });

  // 육체적 부담
  var burdens = ['전혀 힘들지 않음','견딜만 함','약간 힘듦','매우 힘듦'];
  var bCounts = burdens.map(function(b){ return data.filter(function(r){ return r.physicalBurden===b; }).length; });
  if (chartBurden) chartBurden.destroy();
  chartBurden = new Chart(document.getElementById('chartBurden'), {
    type:'doughnut',
    data:{
      labels: burdens,
      datasets:[{data:bCounts, backgroundColor:['rgba(16,185,129,0.8)','rgba(37,99,235,0.8)','rgba(245,158,11,0.8)','rgba(239,68,68,0.8)'], borderWidth:2}]
    },
    options:{plugins:{legend:{position:'bottom',labels:{font:{size:11},padding:8}}}}
  });
}

/* ── 필터 ── */
function applyFilter() {
  var name  = document.getElementById('srchName').value.trim().toLowerCase();
  var dept  = document.getElementById('srchDept').value.trim().toLowerCase();
  var pain  = document.getElementById('srchPain').value;
  var burden= document.getElementById('srchBurden').value;
  filtered = allData.filter(function(r){
    if (name   && (r.name||'').toLowerCase().indexOf(name)<0)   return false;
    if (dept   && (r.dept||'').toLowerCase().indexOf(dept)<0)   return false;
    if (pain   && r.hasPain !== pain)                           return false;
    if (burden && r.physicalBurden !== burden)                  return false;
    return true;
  });
  currentPage = 1;
  renderTable();
}
function resetFilter() {
  document.getElementById('srchName').value='';
  document.getElementById('srchDept').value='';
  document.getElementById('srchPain').value='';
  document.getElementById('srchBurden').value='';
  filtered = allData.slice();
  currentPage = 1;
  renderTable();
}

/* ── 정렬 ── */
function sortBy(key) {
  if (sortKey===key) sortAsc=!sortAsc; else { sortKey=key; sortAsc=true; }
  filtered.sort(function(a,b){
    var av = a[key]||'', bv = b[key]||'';
    if (key==='createdAt') {
      av = a.createdAt ? a.createdAt.seconds : 0;
      bv = b.createdAt ? b.createdAt.seconds : 0;
    }
    if (av<bv) return sortAsc?-1:1;
    if (av>bv) return sortAsc?1:-1;
    return 0;
  });
  renderTable();
}

/* ── 테이블 렌더 ── */
function renderTable() {
  var start = (currentPage-1)*pageSize;
  var page  = filtered.slice(start, start+pageSize);
  var tbody = document.getElementById('tblBody');
  document.getElementById('tblCount').textContent = '총 '+filtered.length+'건 (전체 '+allData.length+'건)';

  if (!page.length) {
    tbody.innerHTML = '<tr class="empty-row"><td colspan="10">검색 결과가 없습니다.</td></tr>';
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  tbody.innerHTML = page.map(function(r, i){
    var dt = r.createdAt ? new Date(r.createdAt.seconds*1000).toLocaleString('ko-KR') : '-';
    var painBadge = r.hasPain==='예'
      ? '<span class="badge badge-pain">통증 있음</span>'
      : '<span class="badge badge-none">없음</span>';
    var burdClass = BURDEN_CLASS[r.physicalBurden] || 'badge-none';
    var burdBadge = r.physicalBurden
      ? '<span class="badge '+burdClass+'">'+r.physicalBurden+'</span>'
      : '-';
    var partTags = (r.painParts&&r.painParts.length)
      ? r.painParts.map(function(p){ return '<span class="part-tag">'+(PART_ICON[p]||'')+p+'</span>'; }).join('')
      : '-';
    return '<tr onclick="openDrawer('+JSON.stringify(start+i)+')">'
      +'<td class="td-name">'+(r.name||'-')+'</td>'
      +'<td class="td-date">'+dt+'</td>'
      +'<td>'+(r.gender||'-')+'</td>'
      +'<td>'+(r.age||'-')+'</td>'
      +'<td>'+(r.dept||'-')+'</td>'
      +'<td style="max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+(r.jobDetail||'')+'">'+(r.jobDetail||'-')+'</td>'
      +'<td>'+burdBadge+'</td>'
      +'<td>'+painBadge+'</td>'
      +'<td>'+partTags+'</td>'
      +'<td>'+(r.housework||'-')+'</td>'
      +'</tr>';
  }).join('');

  renderPagination();
}

/* ── 페이지네이션 ── */
function renderPagination() {
  var total = Math.ceil(filtered.length/pageSize);
  if (total<=1) { document.getElementById('pagination').innerHTML=''; return; }
  var html = '<button class="pg-btn" onclick="changePage('+(currentPage-1)+')" '+(currentPage===1?'disabled':'')+'>◀</button>';
  for (var i=1;i<=total;i++) {
    if (i===1||i===total||Math.abs(i-currentPage)<=2) {
      html += '<button class="pg-btn'+(i===currentPage?' active':'')+'" onclick="changePage('+i+')">'+i+'</button>';
    } else if (Math.abs(i-currentPage)===3) {
      html += '<span style="color:var(--text2);padding:4px">...</span>';
    }
  }
  html += '<button class="pg-btn" onclick="changePage('+(currentPage+1)+')" '+(currentPage===total?'disabled':'')+'>▶</button>';
  document.getElementById('pagination').innerHTML = html;
}
function changePage(p) {
  var total = Math.ceil(filtered.length/pageSize);
  if (p<1||p>total) return;
  currentPage = p;
  renderTable();
  document.querySelector('.tbl-wrap').scrollIntoView({behavior:'smooth'});
}

/* ── 상세 드로어 ── */
function openDrawer(idx) {
  var r = filtered[idx];
  if (!r) return;
  document.getElementById('drawerTitle').textContent = (r.name||'-') + ' 상세 정보';
  var dt = r.createdAt ? new Date(r.createdAt.seconds*1000).toLocaleString('ko-KR') : '-';
  function row(k,v){ return '<div class="d-row"><span class="dk">'+k+'</span><span class="dv">'+(v||'-')+'</span></div>'; }
  function sec(t){ return '<div class="d-section-title">'+t+'</div>'; }

  var h = '<div class="d-section">'+sec('👤 인적사항')
    +row('성명',r.name)+row('연령',(r.age||'-')+'세')
    +row('성별',r.gender)+row('결혼여부',r.marriage)
    +row('현직장경력',(r.careerYr||'0')+'년 '+(r.careerMo||'0')+'개월')
    +row('제출일시',dt)+'</div>';

  h += '<div class="d-section">'+sec('🔧 작업 정보')
    +row('작업부서',(r.dept||'-')+'부 '+(r.line||'-')+'라인')
    +row('수행작업',r.jobDetail)
    +row('현작업기간',(r.jobYr||'0')+'년 '+(r.jobMo||'0')+'개월')
    +row('전 작업',(r.prevJob||'-')+' ('+(r.prevJobYr||'0')+'년 '+(r.prevJobMo||'0')+'개월)')
    +row('1일 근무',(r.workHr||'-')+'시간 / 휴식 '+(r.restMin||'-')+'분 '+(r.restCnt||'-')+'회')+'</div>';

  h += '<div class="d-section">'+sec('🏠 생활습관')
    +row('여가활동',r.hobbies&&r.hobbies.length?r.hobbies.join(', '):'-')
    +row('가사노동시간',r.housework)
    +row('육체적부담',r.physicalBurden)+'</div>';

  h += '<div class="d-section">'+sec('🏥 건강이력')
    +row('질병진단',r.hasDiag==='예'?'예 / '+(r.diagList&&r.diagList.length?r.diagList.join(', '):'-')+' / '+(r.diagStatus||'-'):'아니오')
    +row('사고상해',r.hasInjury==='예'?'예 / '+(r.injuryParts&&r.injuryParts.length?r.injuryParts.join(', '):'-')+' / '+(r.injuryStatus||'-'):'아니오')
    +'</div>';

  if (r.hasPain==='예' && r.painParts && r.painParts.length) {
    h += '<div class="d-section">'+sec('🩺 통증 상세');
    r.painParts.forEach(function(part){
      var d = r.painData && r.painData[part];
      h += '<div style="font-size:12px;font-weight:800;color:var(--accent);margin:10px 0 4px">'+(PART_ICON[part]||'📍')+' '+part+'</div>';
      if (d) {
        if (d.side) h += row('부위',d.side);
        h += row('지속기간',d.dur);
        h += row('통증정도',d.level);
        h += row('증상빈도',d.freq);
        h += row('지난 1주일',d.lastWeek);
        h += row('조치사항',d.action&&d.action.length?d.action.join(', ')+(d.actionEtc?' ('+d.actionEtc+')':''):'-');
      }
    });
    h += '</div>';
  }

  document.getElementById('drawerBody').innerHTML = h;
  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawerBackdrop').classList.add('open');
}
function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawerBackdrop').classList.remove('open');
}

/* ── CSV 다운로드 ── */
function downloadCSV() {
  var cols = ['이름','제출일시','성별','연령','결혼여부','부서','라인','수행작업','현작업기간','전작업','1일근무시간','가사노동','여가활동','질병진단','사고상해','육체적부담','통증여부','통증부위','통증기간','통증정도','증상빈도','지난1주일증상','조치사항'];
  var rows = [cols];
  filtered.forEach(function(r){
    var dt = r.createdAt ? new Date(r.createdAt.seconds*1000).toLocaleString('ko-KR') : '';
    var parts='', dur='', level='', freq='', lastW='', action='';
    if (r.painParts && r.painParts.length) {
      parts = r.painParts.join('/');
      var allDur=[], allLevel=[], allFreq=[], allLastW=[], allAction=[];
      r.painParts.forEach(function(p){
        var d = r.painData && r.painData[p];
        if (d){
          allDur.push(p+':'+d.dur);
          allLevel.push(p+':'+d.level);
          allFreq.push(p+':'+d.freq);
          allLastW.push(p+':'+d.lastWeek);
          allAction.push(p+':'+(d.action?d.action.join('·'):'')+( d.actionEtc?'('+d.actionEtc+')':''));
        }
      });
      dur=allDur.join(' | '); level=allLevel.join(' | '); freq=allFreq.join(' | ');
      lastW=allLastW.join(' | '); action=allAction.join(' | ');
    }
    rows.push([
      r.name||'', dt,
      r.gender||'', r.age||'', r.marriage||'',
      r.dept||'', r.line||'', r.jobDetail||'',
      (r.jobYr||'0')+'년'+(r.jobMo||'0')+'개월',
      (r.prevJob||'')+'('+(r.prevJobYr||'0')+'년'+(r.prevJobMo||'0')+'개월)',
      (r.workHr||'')+'시간/휴식'+(r.restMin||'')+'분'+(r.restCnt||'')+'회',
      r.housework||'',
      r.hobbies?r.hobbies.join('/'):'' ,
      r.hasDiag==='예'?((r.diagList||[]).join('/')+'/'+r.diagStatus):'아니오',
      r.hasInjury==='예'?((r.injuryParts||[]).join('/')+'/'+r.injuryStatus):'아니오',
      r.physicalBurden||'', r.hasPain||'',
      parts, dur, level, freq, lastW, action
    ].map(function(v){ return '"'+String(v).replace(/"/g,'""')+'"'; }));
  });
  var bom = '\uFEFF';
  var csv = bom + rows.map(function(r){ return r.join(','); }).join('\n');
  var blob = new Blob([csv], {type:'text/csv;charset=utf-8'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '근골격계증상조사_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
}
