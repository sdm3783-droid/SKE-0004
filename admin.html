<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>관리자 대시보드 (2026 통합판)</title>
    <style>
        body { font-family:sans-serif; background:#f4f7f6; padding:20px; color:#333; }
        .container { max-width:1200px; margin:0 auto; }
        .card { background:#fff; border-radius:12px; padding:20px; box-shadow:0 4px 6px rgba(0,0,0,0.1); margin-bottom:20px; }
        table { width:100%; border-collapse:collapse; background:#fff; font-size:13px; }
        th, td { border:1px solid #ddd; padding:12px; text-align:left; }
        th { background:#f8f9fa; color:#4f8ef7; }
        tr:hover { background:#f1faff; cursor:pointer; }
        .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:100; align-items:center; justify-content:center; }
        .m-box { background:#fff; padding:30px; border-radius:15px; width:90%; max-width:800px; max-height:90vh; overflow-y:auto; }
        .badge { background:#ff4d4d; color:#fff; padding:2px 6px; border-radius:4px; font-size:11px; }
        .detail-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:20px; border-bottom:1px solid #eee; padding-bottom:10px; }
        .pain-item { border:1px solid #4f8ef7; border-radius:8px; padding:15px; margin-bottom:10px; background:#f9fcff; }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h2>📊 2026 근골격계 조사 통합 현황</h2>
        <table id="main-table">
            <thead>
                <tr>
                    <th>제출일시</th>
                    <th>성명</th>
                    <th>부서/라인</th>
                    <th>통증여부</th>
                    <th>경력</th>
                </tr>
            </thead>
            <tbody id="list"></tbody>
        </table>
    </div>
</div>

<div id="modal" class="modal" onclick="if(event.target==this) this.style.display='none'">
    <div class="m-box">
        <h2 id="m-title">상세 정보</h2>
        <div id="m-content"></div>
        <button onclick="document.getElementById('modal').style.display='none'" style="margin-top:20px; padding:10px 20px;">닫기</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, getDocs, orderBy, query, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC93mYiLYMrF-5IsIzfYnlGQdnK0sdPEfE",
        authDomain: "ske-0004.firebaseapp.com",
        projectId: "ske-0004",
        storageBucket: "ske-0004.firebasestorage.app",
        messagingSenderId: "704127486318",
        appId: "1:704127486318:web:3b8c2c5562978231d3597f"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    window.all = [];

    async function load() {
        const q = query(collection(db, "surveys"), orderBy("createdAt", "desc"));
        const snap = await getDocs(q);
        const list = document.getElementById('list');
        list.innerHTML = '';
        window.all = snap.docs.map(d => ({ id: d.id, ...d.data() }));

        window.all.forEach((r, idx) => {
            const time = r.createdAt ? r.createdAt.toDate().toLocaleString() : '-';
            list.innerHTML += `<tr onclick="window.show(${idx})">
                <td>${time}</td>
                <td><b>${r.name}</b> (${r.age})</td>
                <td>${r.dept}/${r.line}</td>
                <td>${r.hasPain==='예' ? '<span class="badge">통증</span>' : '정상'}</td>
                <td>${r.career}</td>
            </tr>`;
        });
    }

    window.show = (idx) => {
        const r = all[idx];
        document.getElementById('m-title').innerText = `${r.name} 님의 상세 데이터`;
        let html = `
            <div class="detail-row">
                <div>성별: ${r.gender} / 결혼: ${r.marriage}</div>
                <div>작업내용: ${r.jobDetail}</div>
                <div>수행기간: ${r.jobPeriod}</div>
                <div>근무/휴식: ${r.workTime}</div>
                <div>가사노동: ${r.chores}</div>
                <div>취미: ${r.hobbies.join(', ')}</div>
                <div>질병진단: ${r.diag} / 부상경험: ${r.injury}</div>
                <div style="color:red; font-weight:bold;">부담정도: ${r.burden}</div>
            </div>`;

        if(r.painData) {
            Object.entries(r.painData).forEach(([part, d]) => {
                html += `
                <div class="pain-item">
                    <b style="color:#4f8ef7;">📍 ${part}</b>
                    <p>위치: ${d.side} | 지속: ${d.dur} | 정도: ${d.level} | 빈도: ${d.freq}</p>
                    <p>최근1주: ${d.lastWeek} | 조치: ${d.action.join(', ')}</p>
                </div>`;
            });
        }
        html += `<button onclick="window.del('${r.id}')" style="background:none; border:none; color:#ccc; cursor:pointer; font-size:11px;">데이터 삭제</button>`;
        document.getElementById('m-content').innerHTML = html;
        document.getElementById('modal').style.display = 'flex';
    };

    window.del = async (id) => {
        if(confirm('이 기록을 영구 삭제할까요?')) {
            await deleteDoc(doc(db, "surveys", id));
            location.reload();
        }
    };
    load();
</script>
</body>
</html>
