<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>관리자 대시보드 - 상세조사 결과</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background: #080b10; color: #d4e4f7; padding: 20px; }
        .card { background: #0e1318; border: 1px solid #1e2d3d; border-radius: 12px; padding: 25px; margin: 0 auto; max-width: 1200px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 13px; }
        th, td { border: 1px solid #1e2d3d; padding: 12px; text-align: left; }
        th { background: #1a2430; color: #00d4ff; }
        .pain-row { background: rgba(255, 176, 32, 0.05); }
        .badge { background: #ff4d4d; color: #fff; padding: 3px 6px; border-radius: 4px; font-weight: 800; }
        .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:100; align-items:center; justify-content:center; }
        .modal.active { display:flex; }
        .m-box { background:#0e1318; border:1px solid #00d4ff; padding:30px; border-radius:15px; width:90%; max-width:800px; max-height:80vh; overflow-y:auto; }
        .part-block { border:1px solid #1e2d3d; border-radius:8px; padding:15px; margin-bottom:15px; }
        .part-name { font-size:16px; font-weight:900; color:#00d4ff; margin-bottom:10px; border-bottom:1px solid #1e2d3d; padding-bottom:5px; }
    </style>
</head>
<body>

<div class="card">
    <h2>📊 근골격계 상세조사 대시보드</h2>
    <p style="color:#6b8aaa;font-size:12px;">각 행을 클릭하면 이미지 설문지처럼 부위별 6개 상세 항목을 볼 수 있습니다.</p>
    <table>
        <thead>
            <tr>
                <th>제출일시</th>
                <th>성명</th>
                <th>부서/라인</th>
                <th>통증여부</th>
                <th>부위 요약</th>
            </tr>
        </thead>
        <tbody id="list"></tbody>
    </table>
</div>

<div id="modal" class="modal" onclick="if(event.target==this) this.classList.remove('active')">
    <div class="m-box">
        <h2 id="m-title" style="margin-bottom:20px;"></h2>
        <div id="m-content"></div>
        <button onclick="document.getElementById('modal').classList.remove('active')" style="margin-top:20px;padding:10px 20px;cursor:pointer;">닫기</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, getDocs, orderBy, query } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC93mYiLYMrF-5IsIzfYnlGQdnK0sdPEfE",
        authDomain: "ske-0004.firebaseapp.com",
        projectId: "ske-0004",
        storageBucket: "ske-0004.firebasestorage.app",
        messagingSenderId: "704127486318",
        appId: "1:704127486318:web:3b8c2c5562978231d3597f"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    window.allRecords = [];

    async function load() {
        const q = query(collection(db, "surveys"), orderBy("submittedAt", "desc"));
        const snap = await getDocs(q);
        const list = document.getElementById('list');
        list.innerHTML = '';
        window.allRecords = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));

        window.allRecords.forEach((r, idx) => {
            const time = r.submittedAt ? r.submittedAt.toDate().toLocaleString() : '-';
            const row = document.createElement('tr');
            row.onclick = () => showModal(idx);
            row.innerHTML = `
                <td>${time}</td>
                <td><strong>${r.name}</strong></td>
                <td>${r.dept || '-'}/${r.line || '-'}</td>
                <td>${r.hasPain==='예' ? '<span class="badge">통증</span>' : '정상'}</td>
                <td>${r.painParts ? r.painParts.join(', ') : '-'}</td>
            `;
            list.appendChild(row);
        });
    }

    function showModal(idx) {
        const r = allRecords[idx];
        document.getElementById('m-title').innerText = r.name + " 님 상세 분석";
        let html = `<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;">
            <p>나이: ${r.age}세</p><p>성별: ${r.gender}</p>
            <p>경력: ${r.careerYr}년 ${r.careerMo}개월</p>
        </div>`;

        if(r.painData) {
            Object.entries(r.painData).forEach(([part, d]) => {
                html += `
                <div class="part-block">
                    <div class="part-name">📍 ${part}</div>
                    <p>1. 부위: ${d.pos || '-'}</p>
                    <p>2. 지속기간: ${d.duration || '-'}</p>
                    <p style="color:var(--warning)">3. 아픈정도: ${d.level || '-'}</p>
                    <p>4. 빈도: ${d.freq || '-'}</p>
                    <p>5. 최근증상: ${d.lastWeek || '-'}</p>
                    <p>6. 조치: ${Array.isArray(d.action) ? d.action.join(', ') : '-'}</p>
                </div>`;
            });
        } else { html += "<p>상세 통증 정보가 없습니다.</p>"; }

        document.getElementById('m-content').innerHTML = html;
        document.getElementById('modal').classList.add('active');
    }

    load();
</script>
</body>
</html>
