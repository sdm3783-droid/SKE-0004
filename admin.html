<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>근골격계 조사 — 관리자 대시보드</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
  :root {
    --bg: #080b10; --surface: #0e1318; --border: #1e2d3d;
    --accent: #00d4ff; --text: #d4e4f7; --text2: #6b8aaa;
  }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; max-width: 1000px; margin: 0 auto; }
  h2 { margin-bottom: 20px; font-weight: 900; color: var(--accent); }
  table { width: 100%; border-collapse: collapse; margin-top: 15px; }
  th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border); }
  th { font-size: 13px; color: var(--text2); text-transform: uppercase; }
  td { font-size: 14px; }
  .badge { padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: 700; }
  .badge-pain { background: rgba(255, 77, 77, 0.1); color: #ff4d4d; border: 1px solid #ff4d4d; }
  .badge-ok { background: rgba(0, 232, 122, 0.1); color: #00e87a; border: 1px solid #00e87a; }
  .btn-refresh { background: var(--accent); color: #000; border: none; padding: 10px 16px; border-radius: 8px; cursor: pointer; font-weight: 700; margin-bottom: 15px; }
</style>
</head>
<body>

<div class="card">
  <h2>🦴 근골격계 조사 관리자 대시보드</h2>
  <button class="btn-refresh" onclick="location.reload()">↻ 데이터 새로고침</button>
  <div id="stat-text" style="margin-bottom: 10px; color: var(--text2);">조사 결과를 불러오는 중...</div>
  
  <table>
    <thead>
      <tr>
        <th>성명</th>
        <th>나이/성별</th>
        <th>부서/라인</th>
        <th>통증 여부</th>
        <th>제출 일시</th>
      </tr>
    </thead>
    <tbody id="data-list"></tbody>
  </table>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, getDocs, orderBy, query } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyC93mYiLYMrF-5IsIzfYnlGQdnK0sdPEfE",
    authDomain: "ske-0004.firebaseapp.com",
    projectId: "ske-0004",
    storageBucket: "ske-0004.firebasestorage.app",
    messagingSenderId: "704127486318",
    appId: "1:704127486318:web:3b8c2c5562978231d3597f"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  async function loadSurveys() {
    const list = document.getElementById('data-list');
    try {
      const q = query(collection(db, "surveys"), orderBy("submittedAt", "desc"));
      const snapshot = await getDocs(q);
      
      list.innerHTML = '';
      document.getElementById('stat-text').textContent = `총 ${snapshot.size}명의 응답 데이터가 있습니다.`;

      snapshot.forEach(doc => {
        const d = doc.data();
        const date = d.submittedAt ? d.submittedAt.toDate().toLocaleString('ko-KR') : '-';
        
        list.innerHTML += `
          <tr>
            <td><strong>${d.name || '-'}</strong></td>
            <td>${d.age || '-'}세 / ${d.gender || '-'}</td>
            <td>${d.dept || '-'}${d.line ? ' / ' + d.line : ''}</td>
            <td>
              ${d.hasPain === '예' 
                ? '<span class="badge badge-pain">⚠ 통증 있음</span>' 
                : '<span class="badge badge-ok">✓ 통증 없음</span>'}
            </td>
            <td style="font-size: 12px; color: #6b8aaa;">${date}</td>
          </tr>
        `;
      });
    } catch (e) {
      console.error(e);
      list.innerHTML = '<tr><td colspan="5">데이터를 가져오는데 실패했습니다. 콘솔을 확인하세요.</td></tr>';
    }
  }

  loadSurveys();
</script>

</body>
</html>
