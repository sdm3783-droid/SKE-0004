<script type="module">
  // 1. Firebase SDK 임포트
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, getDocs, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  // 2. Firebase 설정 (index.html과 동일한 설정 사용)
  const firebaseConfig = {
    apiKey: "AIzaSyC93mYiLYMrF-5IsIzfYnlGQdnK0sdPEfE",
    authDomain: "ske-0004.firebaseapp.com",
    projectId: "ske-0004",
    storageBucket: "ske-0004.firebasestorage.app",
    messagingSenderId: "704127486318",
    appId: "1:704127486318:web:3b8c2c5562978231d3597f",
    measurementId: "G-E82SNM9EDC"
  };

  // 3. 초기화
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // 전역 변수
  window.allRecords = [];
  window.filteredRecords = [];
  const PARTS_ORDER = ['목','어깨','팔/팔꿈치','손/손목/손가락','허리','다리/발'];

  // 4. 데이터 불러오기 함수
  window.loadData = async function() {
    const tableArea = document.getElementById('table-area');
    const tableCount = document.getElementById('table-count');
    tableArea.innerHTML = '<div class="spinner"></div>';
    tableCount.textContent = '로딩 중...';

    try {
      // 'surveys' 컬렉션에서 시간순(최신순)으로 쿼리
      const q = query(collection(db, "surveys"), orderBy("submittedAt", "desc"));
      const querySnapshot = await getDocs(q);
      
      const records = [];
      querySnapshot.forEach((doc) => {
        const data = doc.data();
        // Firebase Timestamp를 JS Date 객체로 변환
        const submittedAt = data.submittedAt ? data.submittedAt.toDate() : new Date();
        records.push({ id: doc.id, ...data, submittedAt: submittedAt });
      });

      window.allRecords = records;
      updateStats();
      renderTable();
      renderChart();
    } catch (e) {
      console.error("데이터 로드 실패:", e);
      tableArea.innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-text">로드 실패: ${e.message}</div></div>`;
    }
  };

  // 통계 업데이트
  function updateStats() {
    const total = allRecords.length;
    const painCount = allRecords.filter(r => r.hasPain === '예').length;
    const today = new Date().toLocaleDateString('ko-KR');
    const todayCount = allRecords.filter(r => {
      const d = new Date(r.submittedAt);
      return d.toLocaleDateString('ko-KR') === today;
    }).length;

    const partCount = {};
    allRecords.forEach(r => {
      if (r.painParts) r.painParts.split('|').forEach(p => { if(p) partCount[p] = (partCount[p]||0)+1; });
    });
    const topPart = Object.entries(partCount).sort((a,b)=>b[1]-a[1])[0];

    document.getElementById('stat-total').textContent = total;
    document.getElementById('stat-pain').textContent = painCount;
    document.getElementById('stat-pain-pct').textContent = total ? `전체의 ${Math.round(painCount/total*100)}%` : '—';
    document.getElementById('stat-top-part').textContent = topPart ? topPart[0] : '없음';
    document.getElementById('stat-top-part-cnt').textContent = topPart ? `${topPart[1]}명 호소` : '—';
    document.getElementById('stat-today').textContent = todayCount;
    document.getElementById('stat-today-date').textContent = today;
  }

  // 차트 렌더링
  function renderChart() {
    const partCount = {};
    PARTS_ORDER.forEach(p => partCount[p] = 0);
    allRecords.forEach(r => {
      if (r.painParts) r.painParts.split('|').forEach(p => { if(partCount[p]!==undefined) partCount[p]++; });
    });
    const max = Math.max(...Object.values(partCount), 1);
    const section = document.getElementById('chart-section');
    if (allRecords.length > 0) section.style.display = 'block';

    document.getElementById('part-chart').innerHTML = PARTS_ORDER.map(p => `
      <div class="chart-row">
        <div class="chart-label">${p}</div>
        <div class="chart-bar-wrap"><div class="chart-bar" style="width:${Math.round(partCount[p]/max*100)}%"></div></div>
        <div class="chart-val">${partCount[p]}명</div>
      </div>`).join('');
  }

  // 테이블 렌더링
  window.renderTable = function() {
    const qInput = document.getElementById('search-input').value.toLowerCase();
    window.filteredRecords = allRecords.filter(r => 
      !qInput || 
      (r.name||'').toLowerCase().includes(qInput) || 
      (r.dept||'').toLowerCase().includes(qInput) ||
      (r.id||'').toLowerCase().includes(qInput)
    );

    document.getElementById('table-count').textContent = `${filteredRecords.length} / ${allRecords.length} 건`;

    if (filteredRecords.length === 0) {
      document.getElementById('table-area').innerHTML = `<div class="empty"><div class="empty-text">데이터가 없습니다.</div></div>`;
      return;
    }

    let html = `<table><thead><tr><th>이름</th><th>부서/라인</th><th>성별/나이</th><th>통증여부</th><th>통증부위</th><th>제출일시</th></tr></thead><tbody>`;
    filteredRecords.forEach((r, idx) => {
      const dt = new Date(r.submittedAt).toLocaleString('ko-KR', {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'});
      const parts = (r.painParts||'').split('|').filter(Boolean);
      html += `<tr onclick="window.openModal(${idx})">
        <td class="name">${r.name||'—'}</td>
        <td class="dept">${r.dept||'—'} / ${r.line||'—'}</td>
        <td>${r.gender||'—'} / ${r.age||'—'}세</td>
        <td>${r.hasPain==='예' ? '<span class="badge badge-pain">⚠ 통증</span>' : '<span class="badge badge-ok">✓ 정상</span>'}</td>
        <td>${parts.map(p=>`<span class="badge badge-part">${p}</span>`).join('')}</td>
        <td class="mono">${dt}</td>
      </tr>`;
    });
    html += `</tbody></table>`;
    document.getElementById('table-area').innerHTML = html;
  };

  // 모달 창 열기
  window.openModal = function(idx) {
    const r = filteredRecords[idx];
    document.getElementById('modal-title').textContent = `${r.name} 님의 상세 정보`;
    // 상세 정보 바디 구성 (기존 로직과 유사하므로 요약)
    let bodyHtml = `<div class="detail-grid">
      <div class="detail-item"><div class="detail-key">성명</div><div class="detail-val">${r.name}</div></div>
      <div class="detail-item"><div class="detail-key">부서/라인</div><div class="detail-val">${r.dept}/${r.line}</div></div>
      <div class="detail-item"><div class="detail-key">통증부위</div><div class="detail-val">${r.painParts || '없음'}</div></div>
    </div>`;
    
    // 통증 상세가 있다면 추가
    if(r.painData) {
        bodyHtml += `<div class="detail-section-title" style="margin-top:20px;">부위별 상세</div>`;
        Object.entries(r.painData).forEach(([part, d]) => {
            bodyHtml += `<div class="pain-part-block">
                <div class="pain-part-name">${part}</div>
                <div class="pain-grid">
                    <div><div class="pain-item-key">정도</div><div class="pain-item-val">${d.level || '-'}</div></div>
                    <div><div class="pain-item-key">빈도</div><div class="pain-item-val">${d.freq || '-'}</div></div>
                </div>
            </div>`;
        });
    }

    document.getElementById('modal-body').innerHTML = bodyHtml;
    document.getElementById('modal').classList.add('open');
  };

  window.closeModal = function() {
    document.getElementById('modal').classList.remove('open');
  };

  // 🔥 데이터 삭제 기능 (Firebase 연동)
  window.clearAllData = async function() {
    if (!confirm("정말로 모든 데이터를 삭제하시겠습니까? 파이어베이스 서버의 데이터가 영구 삭제됩니다.")) return;
    const pw = prompt("삭제를 확인하려면 '전체삭제'라고 입력하세요.");
    if (pw !== '전체삭제') return;

    try {
      const deletePromises = allRecords.map(r => deleteDoc(doc(db, "surveys", r.id)));
      await Promise.all(deletePromises);
      alert("모든 데이터가 삭제되었습니다.");
      loadData(); // 목록 새로고침
    } catch (e) {
      alert("삭제 중 오류 발생: " + e.message);
    }
  };

  // 초기 로드
  loadData();
</script>
