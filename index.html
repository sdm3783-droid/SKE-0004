<script type="module">
  // 1. Firebase SDK 임포트
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  // 2. Firebase 설정
  const firebaseConfig = {
    apiKey: "AIzaSyC93mYiLYMrF-5IsIzfYnlGQdnK0sdPEfE",
    authDomain: "ske-0004.firebaseapp.com",
    projectId: "ske-0004",
    storageBucket: "ske-0004.firebasestorage.app",
    messagingSenderId: "704127486318",
    appId: "1:704127486318:web:3b8c2c5562978231d3597f",
    measurementId: "G-E82SNM9EDC"
  };

  // 3. 초기화
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // 설문 상태 관리 (window 객체에 붙여 전역 함수에서 접근 가능하게 함)
  window.state = {
    name:'', age:'', gender:'', careerYr:'', careerMo:'', marriage:'',
    dept:'', line:'', jobDesc:'', jobYr:'', jobMo:'', workHr:'', restMin:'', restCnt:'',
    hobby: new Set(), chores:'', workload:'', diag:'', diagStatus:'',
    injury:'', injuryParts: new Set(), hasPain:'', painParts: new Set(), painData:{}
  };

  const PARTS_ORDER = ['목','어깨','팔/팔꿈치','손/손목/손가락','허리','다리/발'];
  const SIDES_FOR = {'목':false,'어깨':true,'팔/팔꿈치':true,'손/손목/손가락':true,'허리':false,'다리/발':true};

  // --- 함수 정의 ---
  window.startSurvey = () => {
    document.getElementById('screen-intro').classList.remove('active');
    document.getElementById('sticky-header').style.display='block';
    showScreen('1');
  };

  window.showScreen = (id) => {
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    document.getElementById('screen-'+id).classList.add('active');
    updateProgress(id);
    window.scrollTo(0,0);
  };

  function updateProgress(id) {
    const map={'1':{pct:33,label:'기본 정보',step:'Step 1 / 3'},'2':{pct:66,label:'통증 여부',step:'Step 2 / 3'},'3':{pct:90,label:'통증 상세',step:'Step 3 / 3'},'result':{pct:100,label:'완료',step:'완료'}};
    const m = map[id] || map['1'];
    document.getElementById('prog-fill').style.width=m.pct+'%';
    document.getElementById('prog-label').textContent=m.label;
    document.getElementById('prog-pct').textContent=m.pct+'%';
    document.getElementById('header-step-label').textContent=m.step;
  }

  window.goPrev = (f) => { if(f===2) showScreen('1'); else if(f===3) showScreen('2'); };

  window.goNext = async (f) => {
    if(f===1){
      collectSection1();
      if(!validateSection1()) return;
      showScreen('2');
    } else if(f===2){
      if(!state.hasPain){ shake('pain-no'); shake('pain-yes'); return; }
      if(state.hasPain==='아니오'){ await submitToFirebase(); buildResult(); showScreen('result'); }
      else showScreen('3');
    } else if(f===3){
      if(state.painParts.size===0){ alert('통증 부위를 선택해주세요.'); return; }
      await submitToFirebase();
      buildResult();
      showScreen('result');
    }
  };

  function collectSection1() {
    state.name=document.getElementById('q-name').value.trim();
    state.age=document.getElementById('q-age').value;
    state.careerYr=document.getElementById('q-career-yr').value;
    state.careerMo=document.getElementById('q-career-mo').value;
    state.dept=document.getElementById('q-dept').value.trim();
    state.line=document.getElementById('q-line').value.trim();
    state.jobDesc=document.getElementById('q-job-desc').value.trim();
    state.jobYr=document.getElementById('q-job-yr').value;
    state.jobMo=document.getElementById('q-job-mo').value;
    state.workHr=document.getElementById('q-work-hr').value;
    state.restMin=document.getElementById('q-rest-min').value;
    state.restCnt=document.getElementById('q-rest-cnt').value;
  }

  function validateSection1() {
    if(!state.name){ shake('qc-name'); document.getElementById('q-name').focus(); return false; }
    if(!state.age || !state.gender){ shake('qc-basic'); return false; }
    return true;
  }

  function shake(id) {
    const el=document.getElementById(id); if(!el) return;
    el.classList.remove('shake'); void el.offsetWidth; el.classList.add('shake');
  }

  // 🔥 핵심: Firebase 전송 함수
  async function submitToFirebase() {
    document.getElementById('loading-overlay').style.display='flex';
    try {
      // 데이터 정리 (Set 객체는 전송이 안 되므로 배열/문자열로 변환)
      const finalData = {
        submittedAt: serverTimestamp(),
        name: state.name, age: state.age, gender: state.gender,
        careerYr: state.careerYr, careerMo: state.careerMo,
        marriage: state.marriage, dept: state.dept, line: state.line,
        jobDesc: state.jobDesc, jobYr: state.jobYr, jobMo: state.jobMo,
        workHr: state.workHr, restMin: state.restMin, restCnt: state.restCnt,
        hobby: [...state.hobby].join('|'),
        chores: state.chores, workload: state.workload,
        diag: state.diag, diagStatus: state.diagStatus,
        injury: state.injury, injuryParts: [...state.injuryParts].join('|'),
        hasPain: state.hasPain,
        painParts: [...state.painParts].join('|'),
        painData: Object.fromEntries(
          Object.entries(state.painData).map(([part, d]) => [part, {
            ...d,
            action: d.action ? [...d.action].join('|') : ''
          }])
        )
      };

      const docRef = await addDoc(collection(db, "surveys"), finalData);
      state._submitId = docRef.id;
      document.getElementById('submit-id-display').textContent = docRef.id;
    } catch (e) {
      console.error("저장 실패:", e);
      alert("데이터 저장 중 오류가 발생했습니다.");
    } finally {
      document.getElementById('loading-overlay').style.display='none';
    }
  }

  // UI 헬퍼 함수들
  window.selectRadio = (btn, group) => {
    const parent = btn.closest('.options-grid') || btn.parentElement;
    parent.querySelectorAll('.option-btn').forEach(b=>b.classList.remove('selected'));
    btn.classList.add('selected');
    state[group] = btn.querySelector('.opt-label').textContent;
  };

  window.toggleCheck = (btn, group, value) => {
    document.getElementById('hobby-none').classList.remove('selected');
    state.hobby.delete('해당사항 없음');
    if(btn.classList.contains('selected')){ btn.classList.remove('selected'); state[group].delete(value); }
    else{ btn.classList.add('selected'); state[group].add(value); }
  };

  window.toggleNone = (btn, group) => {
    btn.closest('.options-grid').querySelectorAll('.option-btn').forEach(b=>b.classList.remove('selected'));
    btn.classList.add('selected'); state[group] = new Set(['해당사항 없음']);
  };

  window.selectGender = (g) => {
    document.getElementById('opt-male').classList.toggle('selected', g==='남');
    document.getElementById('opt-female').classList.toggle('selected', g==='여');
    state.gender = g;
  };

  window.selectMarriage = (m) => {
    document.getElementById('opt-married').classList.toggle('selected', m==='기혼');
    document.getElementById('opt-single').classList.toggle('selected', m==='미혼');
    state.marriage = m;
  };

  window.selectDiag = (v) => {
    document.getElementById('diag-no').classList.toggle('selected', v==='아니오');
    document.getElementById('diag-yes').classList.toggle('selected', v==='예');
    state.diag = v;
    document.getElementById('diag-detail').style.display = v==='예' ? 'block' : 'none';
  };

  window.selectInjury = (v) => {
    document.getElementById('injury-no').classList.toggle('selected', v==='아니오');
    document.getElementById('injury-yes').classList.toggle('selected', v==='예');
    state.injury = v;
    document.getElementById('injury-detail').style.display = v==='예' ? 'block' : 'none';
  };

  window.selectPain = (v) => {
    document.getElementById('pain-no').classList.toggle('selected', v==='아니오');
    document.getElementById('pain-yes').classList.toggle('selected', v==='예');
    state.hasPain = v;
  };

  window.selectMini = (btn, key) => {
    btn.parentElement.querySelectorAll('.mini-opt').forEach(b=>b.classList.remove('selected'));
    btn.classList.add('selected'); state[key] = btn.textContent;
  };

  window.toggleMiniCheck = (btn, key) => {
    btn.classList.toggle('selected');
    const val = btn.textContent;
    if(btn.classList.contains('selected')) state.injuryParts.add(val);
    else state.injuryParts.delete(val);
  };

  window.toggleBodyPart = (btn, part) => {
    btn.classList.toggle('selected');
    if(btn.classList.contains('selected')){ state.painParts.add(part); if(!state.painData[part]) state.painData[part]={}; }
    else { state.painParts.delete(part); }
    renderPainDetails();
  };

  function renderPainDetails() {
    const container = document.getElementById('pain-details');
    container.innerHTML = '';
    PARTS_ORDER.forEach(part => {
      if(!state.painParts.has(part)) return;
      const d = state.painData[part] || {};
      const hasSide = SIDES_FOR[part];
      container.innerHTML += `
        <div class="pain-detail-panel">
          <div class="panel-title">📍 ${part}</div>
          ${hasSide ? `<div class="sub-q"><div class="sub-q-text">① 부위</div><div class="mini-options">${['오른쪽','왼쪽','양쪽'].map(s=>`<div class="mini-opt${d.side===s?' selected':''}" onclick="window.setPainField('${part}','side','${s}',this)">${s}</div>`).join('')}</div></div>` : ''}
          <div class="sub-q"><div class="sub-q-text">② 지속 기간</div><div class="mini-options">${['1일 미만','1일~1주','1주~1달','1달~6개월','6개월 이상'].map(s=>`<div class="mini-opt${d.duration===s?' selected':''}" onclick="window.setPainField('${part}','duration','${s}',this)">${s}</div>`).join('')}</div></div>
          <div class="sub-q"><div class="sub-q-text">③ 통증 정도</div><div class="mini-options">${['약함','중간','심함','매우심함'].map(s=>`<div class="mini-opt${d.level===s?' selected':''}" onclick="window.setPainField('${part}','level','${s}',this)">${s}</div>`).join('')}</div></div>
          <div class="sub-q"><div class="sub-q-text">④ 빈도</div><div class="mini-options">${['6개월 1번','2~3달 1번','1달 1번','1주 1번','매일'].map(s=>`<div class="mini-opt${d.freq===s?' selected':''}" onclick="window.setPainField('${part}','freq','${s}',this)">${s}</div>`).join('')}</div></div>
          <div class="sub-q"><div class="sub-q-text">⑤ 최근 1주일 증상</div><div class="mini-options">${['아니오','예'].map(s=>`<div class="mini-opt${d.lastWeek===s?' selected':''}" onclick="window.setPainField('${part}','lastWeek','${s}',this)">${s}</div>`).join('')}</div></div>
          <div class="sub-q" style="margin-bottom:0"><div class="sub-q-text">⑥ 취한 조치</div><div class="mini-options">${['병원','약국','병가','작업전환','없음'].map(s=>`<div class="mini-opt${(d.action||new Set()).has?.(s)?' selected':''}" onclick="window.togglePainAction('${part}','${s}',this)">${s}</div>`).join('')}</div></div>
        </div>`;
    });
  }

  window.setPainField = (part, field, value, btn) => {
    if(!state.painData[part]) state.painData[part]={};
    state.painData[part][field] = value;
    btn.parentElement.querySelectorAll('.mini-opt').forEach(b=>b.classList.remove('selected'));
    btn.classList.add('selected');
  };

  window.togglePainAction = (part, value, btn) => {
    if(!state.painData[part]) state.painData[part]={};
    if(!state.painData[part].action) state.painData[part].action = new Set();
    btn.classList.toggle('selected');
    if(btn.classList.contains('selected')) state.painData[part].action.add(value);
    else state.painData[part].action.delete(value);
  };

  function buildResult() {
    const rows = [['성명', state.name], ['나이', state.age+'세'], ['부서/라인', state.dept + '/' + state.line], ['통증 여부', state.hasPain]];
    document.getElementById('result-basic').innerHTML = `<div class="result-card-title">👤 기본 정보 요약</div>` + 
      rows.map(([k,v])=>`<div class="result-row"><span class="result-key">${k}</span><span class="result-val">${v}</span></div>`).join('');
    
    if(state.hasPain === '예') {
      const pCard = document.getElementById('result-pain');
      pCard.style.display = 'block';
      pCard.innerHTML = `<div class="result-card-title">🩺 통증 부위</div>` + [...state.painParts].map(p=>`<span class="pain-tag">${p}</span>`).join('');
    }
  }

  window.resetSurvey = () => { location.reload(); };

</script>
