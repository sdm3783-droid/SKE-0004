<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>근골격계질환 증상조사표</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
  :root {
    --bg:#0f0f13;--surface:#1a1a22;--surface2:#22222e;--border:#2e2e3e;
    --accent:#4f8ef7;--accent2:#7c5cfc;--success:#34c97a;--warning:#f7a84f;
    --danger:#f75c5c;--text:#e8e8f0;--text2:#9090a8;--text3:#5a5a72;
    --radius:16px;--radius-sm:10px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
  .header{position:sticky;top:0;z-index:100;background:rgba(15,15,19,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;}
  .header-title{font-size:15px;font-weight:700;}
  .header-sub{font-size:11px;color:var(--text2);margin-top:2px;}
  .progress-wrap{padding:0 20px 14px;background:rgba(15,15,19,0.95);}
  .progress-label{display:flex;justify-content:space-between;font-size:11px;color:var(--text2);margin-bottom:6px;}
  .progress-bar{height:4px;background:var(--border);border-radius:2px;}
  .progress-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width 0.4s ease;}
  .screen{display:none;}
  .screen.active{display:block;}
  .intro-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;background:radial-gradient(ellipse at 20% 80%,rgba(79,142,247,.12),transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(124,92,252,.12),transparent 60%),var(--bg);}
  .intro-icon{width:80px;height:80px;border-radius:24px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:36px;margin-bottom:28px;box-shadow:0 20px 60px rgba(79,142,247,.3);}
  .intro-title{font-size:22px;font-weight:900;text-align:center;line-height:1.4;margin-bottom:8px;}
  .intro-sub{font-size:13px;color:var(--text2);text-align:center;line-height:1.7;margin-bottom:32px;}
  .intro-info{width:100%;background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:18px;margin-bottom:28px;}
  .intro-info-row{display:flex;align-items:flex-start;gap:10px;margin-bottom:12px;}
  .info-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);margin-top:7px;flex-shrink:0;}
  .info-text{font-size:13px;color:var(--text2);line-height:1.6;}
  .section-wrap{padding:0 16px 100px;}
  .section-header{padding:28px 4px 20px;border-bottom:1px solid var(--border);margin-bottom:20px;}
  .section-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(79,142,247,.12);border:1px solid rgba(79,142,247,.3);border-radius:20px;padding:4px 12px;font-size:11px;font-weight:700;color:var(--accent);text-transform:uppercase;margin-bottom:10px;}
  .section-title{font-size:18px;font-weight:800;line-height:1.4;}
  .section-desc{font-size:13px;color:var(--text2);margin-top:6px;}
  .q-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:12px;}
  .q-number{font-size:10px;font-weight:700;color:var(--accent);margin-bottom:8px;}
  .q-text{font-size:14px;font-weight:500;margin-bottom:14px;}
  .q-required{color:var(--danger);}
  .q-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:14px;padding:12px 14px;outline:none;}
  .input-row{display:flex;gap:8px;align-items:center;}
  .input-unit{font-size:13px;color:var(--text2);}
  .options-grid{display:flex;flex-direction:column;gap:8px;}
  .option-btn{display:flex;align-items:center;gap:10px;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;cursor:pointer;}
  .option-btn.selected{background:rgba(79,142,247,.12);border-color:var(--accent);}
  .opt-icon{width:20px;height:20px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;}
  .option-btn.selected .opt-icon{background:var(--accent);border-color:var(--accent);}
  .opt-label{font-size:13px;font-weight:500;}
  .body-parts{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px;}
  .body-part-btn{background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:14px 8px;cursor:pointer;text-align:center;}
  .body-part-btn.selected{background:rgba(79,142,247,.12);border-color:var(--accent);}
  .pain-detail-panel{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;}
  .panel-title{font-size:13px;font-weight:800;color:var(--accent);margin-bottom:14px;}
  .mini-options{display:flex;flex-wrap:wrap;gap:6px;}
  .mini-opt{background:var(--surface);border:1.5px solid var(--border);border-radius:8px;padding:7px 11px;font-size:12px;cursor:pointer;}
  .mini-opt.selected{background:rgba(79,142,247,.15);border-color:var(--accent);color:var(--accent);font-weight:700;}
  .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(15,15,19,0.95);backdrop-filter:blur(20px);border-top:1px solid var(--border);padding:12px 16px;display:flex;gap:10px;z-index:200;}
  .btn{flex:1;padding:15px;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:700;cursor:pointer;}
  .btn-prev{background:var(--surface2);color:var(--text2);border:1px solid var(--border);flex:0 0 80px;}
  .btn-next{background:linear-gradient(135deg,var(--accent),var(--accent2));color:white;}
  .btn-submit{background:linear-gradient(135deg,var(--success),#20a060);color:white;}
  .loading-overlay{position:fixed;inset:0;background:rgba(15,15,19,.9);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;}
  .spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:16px;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .result-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:40px 20px;background:var(--bg);}
  .shake{animation:shake .4s ease;border-color:var(--danger)!important;}
  @keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
</style>
</head>
<body>

<div id="loading-overlay" class="loading-overlay" style="display:none;">
  <div class="spinner"></div>
  <div class="loading-text">제출 중입니다...</div>
</div>

<div class="screen active" id="screen-intro">
  <div class="intro-wrap">
    <div class="intro-icon">🦴</div>
    <div class="intro-title">근골격계질환<br>증상조사표</div>
    <div class="intro-sub">작업 관련 근골격계 증상을 확인하기 위한<br>조사표입니다. 약 5분 소요됩니다.</div>
    <div class="intro-info">
      <div class="intro-info-row"><div class="info-dot"></div><div class="info-text">솔직한 답변이 정확한 분석을 돕습니다.</div></div>
      <div class="intro-info-row"><div class="info-dot"></div><div class="info-text">모든 정보는 보안 처리됩니다.</div></div>
    </div>
    <button class="btn btn-next" style="width:100%;max-width:300px;" onclick="window.startSurvey()">설문 시작하기 →</button>
  </div>
</div>

<div id="sticky-header" style="display:none;">
  <div class="header">
    <div>
      <div class="header-title">근골격계 증상조사표</div>
      <div class="header-sub" id="header-step-label">Step 1 / 3</div>
    </div>
  </div>
  <div class="progress-wrap">
    <div class="progress-label"><span id="prog-label">기본 정보</span><span id="prog-pct">0%</span></div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
  </div>
</div>

<div class="screen" id="screen-1">
  <div class="section-wrap">
    <div class="section-header">
      <div class="section-badge">Step 1</div>
      <div class="section-title">기본 정보</div>
    </div>
    <div class="q-card" id="qc-name">
      <div class="q-number">Q1</div>
      <div class="q-text">성명 <span class="q-required">*</span></div>
      <input class="q-input" type="text" id="q-name" placeholder="이름을 입력하세요">
    </div>
    <div class="q-card" id="qc-basic">
      <div class="q-number">Q2</div>
      <div class="q-text">나이 및 성별 <span class="q-required">*</span></div>
      <input class="q-input" type="number" id="q-age" placeholder="나이(만)" style="margin-bottom:10px;">
      <div style="display:flex;gap:8px;">
        <div class="option-btn" id="opt-male" onclick="window.selectGender('남')" style="flex:1;"><div class="opt-icon"></div><div class="opt-label">남</div></div>
        <div class="option-btn" id="opt-female" onclick="window.selectGender('여')" style="flex:1;"><div class="opt-icon"></div><div class="opt-label">여</div></div>
      </div>
    </div>
    <div class="q-card">
      <div class="q-number">Q3</div>
      <div class="q-text">부서 및 라인</div>
      <input class="q-input" type="text" id="q-dept" placeholder="부서" style="margin-bottom:10px;">
      <input class="q-input" type="text" id="q-line" placeholder="라인">
    </div>
  </div>
  <div class="bottom-nav">
    <button class="btn btn-next" onclick="window.goNext(1)">다음 단계 →</button>
  </div>
</div>

<div class="screen" id="screen-2">
  <div class="section-wrap">
    <div class="section-header">
      <div class="section-badge">Step 2</div>
      <div class="section-title">통증 유무</div>
    </div>
    <div class="q-card">
      <div class="q-text">지난 1년간 통증이나 불편함이 있었습니까? <span class="q-required">*</span></div>
      <div class="options-grid">
        <div class="option-btn" id="pain-no" onclick="window.selectPain('아니오')"><div class="opt-icon"></div><div class="opt-label">아니오</div></div>
        <div class="option-btn" id="pain-yes" onclick="window.selectPain('예')"><div class="opt-icon"></div><div class="opt-label">예 (상세 작성)</div></div>
      </div>
    </div>
  </div>
  <div class="bottom-nav">
    <button class="btn btn-prev" onclick="window.goPrev(2)">이전</button>
    <button class="btn btn-next" onclick="window.goNext(2)">다음 단계 →</button>
  </div>
</div>

<div class="screen" id="screen-3">
  <div class="section-wrap">
    <div class="section-header">
      <div class="section-badge">Step 3</div>
      <div class="section-title">상세 정보</div>
    </div>
    <div class="body-parts">
      <div class="body-part-btn" onclick="window.toggleBodyPart(this,'목')">목</div>
      <div class="body-part-btn" onclick="window.toggleBodyPart(this,'어깨')">어깨</div>
      <div class="body-part-btn" onclick="window.toggleBodyPart(this,'허리')">허리</div>
      <div class="body-part-btn" onclick="window.toggleBodyPart(this,'손목')">손목</div>
    </div>
    <div id="pain-details"></div>
  </div>
  <div class="bottom-nav">
    <button class="btn btn-prev" onclick="window.goPrev(3)">이전</button>
    <button class="btn btn-next btn-submit" onclick="window.goNext(3)">제출하기 ✓</button>
  </div>
</div>

<div class="screen" id="screen-result">
  <div class="result-wrap">
    <div class="intro-icon">✅</div>
    <div class="intro-title">제출 완료!</div>
    <div id="submit-id-display" style="margin-top:20px; color:var(--text2);">ID: -</div>
    <button class="btn-next btn" onclick="location.reload()" style="margin-top:30px;">새로 작성하기</button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyC93mYiLYMrF-5IsIzfYnlGQdnK0sdPEfE",
    authDomain: "ske-0004.firebaseapp.com",
    projectId: "ske-0004",
    storageBucket: "ske-0004.firebasestorage.app",
    messagingSenderId: "704127486318",
    appId: "1:704127486318:web:3b8c2c5562978231d3597f",
    measurementId: "G-E82SNM9EDC"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // 전역 상태
  window.state = {
    name:'', age:'', gender:'', dept:'', line:'', hasPain:'', painParts: new Set(), painData: {}
  };

  // 모든 함수를 window에 연결하여 HTML에서 직접 접근 가능하게 함
  window.startSurvey = () => {
    document.getElementById('screen-intro').classList.remove('active');
    document.getElementById('sticky-header').style.display='block';
    window.showScreen('1');
  };

  window.showScreen = (id) => {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('screen-' + id).classList.add('active');
    updateProgress(id);
    window.scrollTo(0,0);
  };

  function updateProgress(id) {
    const map = {'1':33, '2':66, '3':90, 'result':100};
    const pct = map[id] || 0;
    document.getElementById('prog-fill').style.width = pct + '%';
    document.getElementById('prog-pct').textContent = pct + '%';
  }

  window.goPrev = (f) => window.showScreen(f - 1);

  window.goNext = async (f) => {
    if(f === 1) {
      state.name = document.getElementById('q-name').value.trim();
      state.age = document.getElementById('q-age').value;
      if(!state.name || !state.age || !state.gender) { alert('필수 항목을 채워주세요.'); return; }
      window.showScreen('2');
    } else if(f === 2) {
      if(!state.hasPain) { alert('통증 여부를 선택하세요.'); return; }
      if(state.hasPain === '아니오') await window.submitData();
      else window.showScreen('3');
    } else if(f === 3) {
      if(state.painParts.size === 0) { alert('부위를 선택하세요.'); return; }
      await window.submitData();
    }
  };

  window.submitData = async () => {
    document.getElementById('loading-overlay').style.display = 'flex';
    try {
      const docRef = await addDoc(collection(db, "surveys"), {
        ...window.state,
        painParts: Array.from(window.state.painParts),
        submittedAt: serverTimestamp()
      });
      document.getElementById('submit-id-display').textContent = 'ID: ' + docRef.id;
      window.showScreen('result');
    } catch (e) {
      alert("오류 발생: " + e.message);
    } finally {
      document.getElementById('loading-overlay').style.display = 'none';
    }
  };

  window.selectGender = (g) => {
    state.gender = g;
    document.getElementById('opt-male').classList.toggle('selected', g === '남');
    document.getElementById('opt-female').classList.toggle('selected', g === '여');
  };

  window.selectPain = (p) => {
    state.hasPain = p;
    document.getElementById('pain-no').classList.toggle('selected', p === '아니오');
    document.getElementById('pain-yes').classList.toggle('selected', p === '예');
  };

  window.toggleBodyPart = (btn, part) => {
    btn.classList.toggle('selected');
    if(btn.classList.contains('selected')) state.painParts.add(part);
    else state.painParts.delete(part);
    renderDetails();
  };

  function renderDetails() {
    const container = document.getElementById('pain-details');
    container.innerHTML = '';
    state.painParts.forEach(part => {
      container.innerHTML += `
        <div class="pain-detail-panel">
          <div class="panel-title">📍 ${part} 통증 정도</div>
          <div class="mini-options">
            ${['약함','중간','심함'].map(lv => `<div class="mini-opt" onclick="window.setLv('${part}','${lv}',this)">${lv}</div>`).join('')}
          </div>
        </div>`;
    });
  }

  window.setLv = (part, lv, btn) => {
    state.painData[part] = lv;
    btn.parentElement.querySelectorAll('.mini-opt').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
  };
</script>

</body>
</html>
