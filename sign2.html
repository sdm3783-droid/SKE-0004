<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>산업안전교육 - 전자서명</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:#f0fdf4;color:#1e293b;min-height:100vh;}

#loadingScreen{position:fixed;inset:0;background:linear-gradient(135deg,#064e3b,#065f46);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;color:#fff;}
#loadingScreen.hide{display:none;}
.spin{width:48px;height:48px;border:4px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;margin-bottom:16px;}
@keyframes spin{to{transform:rotate(360deg);}}

#noSession{display:none;position:fixed;inset:0;background:#f0fdf4;align-items:center;justify-content:center;flex-direction:column;gap:12px;padding:24px;text-align:center;}
#noSession.show{display:flex;}

.hdr{background:linear-gradient(135deg,#064e3b,#065f46);color:#fff;padding:14px 16px;position:sticky;top:0;z-index:100;box-shadow:0 4px 16px rgba(0,0,0,.2);}
.hdr-title{font-size:15px;font-weight:900;}
.hdr-sub{font-size:11px;opacity:.8;margin-top:2px;}

.container{max-width:700px;margin:0 auto;padding:16px;}

.card{background:#fff;border:1px solid #d1fae5;border-radius:14px;padding:16px;margin-bottom:14px;box-shadow:0 4px 20px rgba(6,95,70,.07);}
.card-title{font-size:13px;font-weight:800;margin-bottom:12px;display:flex;align-items:center;gap:6px;color:#1e293b;}

.step-badge{display:inline-flex;align-items:center;gap:6px;background:linear-gradient(135deg,#065f46,#059669);color:#fff;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;margin-bottom:10px;}

.session-info{background:linear-gradient(135deg,rgba(6,95,70,.05),rgba(5,150,105,.05));border:1px solid rgba(6,95,70,.15);border-radius:10px;padding:14px;margin-bottom:14px;}
.session-month{font-size:22px;font-weight:900;color:#065f46;}
.session-title{font-size:14px;font-weight:700;margin-top:4px;}
.session-meta{font-size:11px;color:#64748b;margin-top:4px;}

#pdfFrame{width:100%;height:70vh;border:none;border-radius:10px;background:#f8fafc;}
.pdf-notice{background:#f0fdf4;border:1px solid #86efac;border-radius:8px;padding:10px 12px;font-size:12px;color:#166534;margin-bottom:10px;display:flex;gap:8px;align-items:flex-start;}

.confirm-box{background:#f0fdf4;border:1.5px solid #10b981;border-radius:10px;padding:14px;display:flex;align-items:center;gap:12px;cursor:pointer;margin-bottom:4px;}
.confirm-box input[type=checkbox]{width:20px;height:20px;accent-color:#10b981;cursor:pointer;flex-shrink:0;}
.confirm-text{font-size:13px;font-weight:700;color:#065f46;}

.form-group{margin-bottom:12px;}
.form-label{font-size:12px;font-weight:700;color:#374151;margin-bottom:6px;display:block;}
.form-inp{width:100%;padding:12px 14px;border:1.5px solid #d1fae5;border-radius:10px;font-size:14px;font-family:'Noto Sans KR',sans-serif;outline:none;transition:.2s;}
.form-inp:focus{border-color:#065f46;}

.canvas-wrap{border:2px dashed #065f46;border-radius:10px;overflow:hidden;background:#fafbff;position:relative;}
#signCanvas{width:100%;height:200px;display:block;touch-action:none;cursor:crosshair;}
.canvas-hint{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;color:#94a3b8;font-size:12px;transition:.3s;}
#canvasHint.hide{opacity:0;}
.canvas-actions{display:flex;gap:8px;margin-top:8px;}

.btn{padding:12px 20px;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:.2s;width:100%;}
.btn-primary{background:linear-gradient(135deg,#065f46,#059669);color:#fff;}
.btn-primary:hover{opacity:.9;}
.btn-primary:disabled{background:#94a3b8;cursor:not-allowed;}
.btn-clear{background:#f1f5f9;color:#64748b;font-size:12px;padding:8px 14px;width:auto;}
.btn-clear:hover{background:#e2e8f0;}

.locked{opacity:.4;pointer-events:none;}

#successScreen{display:none;position:fixed;inset:0;background:linear-gradient(135deg,#064e3b,#065f46);align-items:center;justify-content:center;flex-direction:column;color:#fff;text-align:center;padding:24px;z-index:500;}
#successScreen.show{display:flex;}
.success-icon{font-size:72px;margin-bottom:20px;animation:pop .4s ease;}
@keyframes pop{from{transform:scale(0);}to{transform:scale(1);}}
.success-title{font-size:24px;font-weight:900;margin-bottom:8px;}
.success-sub{font-size:14px;opacity:.85;line-height:1.6;}
.success-info{background:rgba(255,255,255,.15);border-radius:12px;padding:14px 20px;margin-top:20px;font-size:13px;line-height:1.8;}
</style>
</head>
<body>

<div id="loadingScreen">
  <div class="spin"></div>
  <div style="font-size:14px;font-weight:700;">교육 정보를 불러오는 중...</div>
</div>

<div id="noSession">
  <div style="font-size:48px;">📭</div>
  <div style="font-size:18px;font-weight:900;color:#1e293b;">현재 진행 중인 교육이 없습니다</div>
  <div style="font-size:13px;color:#64748b;">관리자가 교육 회차를 활성화하면 이용할 수 있습니다.</div>
</div>

<div id="mainContent" style="display:none;">
  <div class="hdr">
    <div class="hdr-title">🦺 산업안전교육 전자서명</div>
    <div class="hdr-sub" id="hdrSub">교육자료를 확인하고 서명해 주세요</div>
  </div>

  <div class="container">
    <div class="session-info">
      <div class="session-month" id="sessionMonth"></div>
      <div class="session-title" id="sessionTitle">산업안전교육</div>
      <div class="session-meta" id="sessionMeta"></div>
    </div>

    <div class="card" id="step1Card">
      <div class="step-badge">📄 STEP 1 교육자료 확인</div>
      <div class="pdf-notice">⚠️ 아래 교육자료를 끝까지 읽어보신 후 하단 체크박스를 체크해 주세요.</div>
      <div style="margin-bottom:10px;">
        <iframe id="pdfFrame" src="" title="교육자료"></iframe>
      </div>
      <label class="confirm-box" id="confirmBox">
        <input type="checkbox" id="confirmChk" onchange="onConfirmChange()">
        <span class="confirm-text">✅ 위 교육자료를 모두 확인하였습니다.</span>
      </label>
    </div>

    <div class="card locked" id="step2Card">
      <div class="step-badge">👤 STEP 2 본인 정보 입력</div>
      <div class="form-group">
        <label class="form-label">성명 *</label>
        <input type="text" id="inpName" class="form-inp" placeholder="이름을 입력해 주세요" maxlength="20">
      </div>
      <div class="form-group">
        <label class="form-label">부서 *</label>
        <input type="text" id="inpDept" class="form-inp" placeholder="부서명을 입력해 주세요" maxlength="30">
      </div>
      <div class="form-group">
        <label class="form-label">성별 *</label>
        <div style="display:flex;gap:16px;margin-top:6px;">
          <label style="display:flex;align-items:center;gap:8px;font-size:15px;font-weight:600;cursor:pointer;padding:10px 20px;border:2px solid #d1fae5;border-radius:10px;flex:1;justify-content:center;transition:.2s;" id="genderLabelM">
            <input type="radio" name="inpGender" value="남" id="genderM" style="accent-color:#065f46;width:18px;height:18px;" onchange="highlightGender()"> 남
          </label>
          <label style="display:flex;align-items:center;gap:8px;font-size:15px;font-weight:600;cursor:pointer;padding:10px 20px;border:2px solid #d1fae5;border-radius:10px;flex:1;justify-content:center;transition:.2s;" id="genderLabelF">
            <input type="radio" name="inpGender" value="여" id="genderF" style="accent-color:#db2777;width:18px;height:18px;" onchange="highlightGender()"> 여
          </label>
        </div>
      </div>
    </div>

    <div class="card locked" id="step3Card">
      <div class="step-badge">✍️ STEP 3 전자서명</div>
      <p style="font-size:12px;color:#64748b;margin-bottom:10px;">손가락 또는 마우스로 아래 서명란에 서명해 주세요.</p>
      <div class="canvas-wrap">
        <canvas id="signCanvas" width="700" height="200"></canvas>
        <div class="canvas-hint" id="canvasHint">여기에 서명하세요</div>
      </div>
      <div class="canvas-actions">
        <button class="btn btn-clear" onclick="clearCanvas()">🗑 서명 지우기</button>
        <span style="font-size:11px;color:#94a3b8;line-height:1.4;padding-top:4px;">서명 후 아래 제출 버튼을 눌러주세요</span>
      </div>
    </div>

    <div id="submitWrap" class="locked" style="margin-bottom:40px;">
      <button class="btn btn-primary" onclick="submitSign()">📩 서명 제출하기</button>
    </div>
  </div>
</div>

<div id="successScreen">
  <div class="success-icon">✅</div>
  <div class="success-title">서명 완료!</div>
  <div class="success-sub">산업안전교육 전자서명이<br>정상적으로 제출되었습니다.</div>
  <div class="success-info" id="successInfo"></div>
</div>

<script>
var canvas, ctx, drawing = false, hasSig = false;

function initCanvas(){
  canvas = document.getElementById('signCanvas');
  ctx = canvas.getContext('2d');
  var rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * window.devicePixelRatio;
  canvas.height = rect.height * window.devicePixelRatio;
  ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
  ctx.strokeStyle = '#1e293b';
  ctx.lineWidth = 2.5;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  canvas.addEventListener('mousedown', function(e){ startDraw(getPos(e)); });
  canvas.addEventListener('mousemove', function(e){ if(drawing) draw(getPos(e)); });
  canvas.addEventListener('mouseup', stopDraw);
  canvas.addEventListener('mouseleave', stopDraw);
  canvas.addEventListener('touchstart', function(e){ e.preventDefault(); startDraw(getTouchPos(e)); },{passive:false});
  canvas.addEventListener('touchmove',  function(e){ e.preventDefault(); if(drawing) draw(getTouchPos(e)); },{passive:false});
  canvas.addEventListener('touchend',   function(e){ e.preventDefault(); stopDraw(); },{passive:false});
}
function getPos(e){ var r=canvas.getBoundingClientRect(); return {x:e.clientX-r.left,y:e.clientY-r.top}; }
function getTouchPos(e){ var r=canvas.getBoundingClientRect(); var t=e.touches[0]; return {x:t.clientX-r.left,y:t.clientY-r.top}; }
function startDraw(pos){ drawing=true; ctx.beginPath(); ctx.moveTo(pos.x,pos.y); document.getElementById('canvasHint').classList.add('hide'); }
function draw(pos){ ctx.lineTo(pos.x,pos.y); ctx.stroke(); hasSig=true; }
function stopDraw(){ drawing=false; }
function clearCanvas(){ var r=canvas.getBoundingClientRect(); ctx.clearRect(0,0,r.width,r.height); hasSig=false; document.getElementById('canvasHint').classList.remove('hide'); }

function highlightGender(){
  var m = document.querySelector('input[name="inpGender"][value="남"]').checked;
  document.getElementById('genderLabelM').style.borderColor = m ? '#065f46' : '#d1fae5';
  document.getElementById('genderLabelM').style.background  = m ? '#f0fdf4' : '';
  document.getElementById('genderLabelF').style.borderColor = !m ? '#db2777' : '#d1fae5';
  document.getElementById('genderLabelF').style.background  = !m ? '#fdf2f8' : '';
}

function onConfirmChange(){
  var checked = document.getElementById('confirmChk').checked;
  document.getElementById('step2Card').classList.toggle('locked', !checked);
  document.getElementById('step3Card').classList.toggle('locked', !checked);
  document.getElementById('submitWrap').classList.toggle('locked', !checked);
  if(checked && !canvas) initCanvas();
}
</script>

<script type="module">
import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc, query, where, Timestamp }
  from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const cfg = {
  apiKey:"AIzaSyC93mYiLYMrF-5IsIzfYnlGQdnK0sdPEfE",
  authDomain:"ske-0004.firebaseapp.com",
  projectId:"ske-0004",
  storageBucket:"ske-0004.firebasestorage.app",
  messagingSenderId:"704127486318",
  appId:"1:704127486318:web:3b8c2c5562978231d3597f"
};
const app = getApps().length ? getApps()[0] : initializeApp(cfg);
const db  = getFirestore(app, '(default)');

var activeSession = null;

async function loadSession(){
  try{
    const snap = await getDocs(query(
      collection(db,'safety_sessions'),
      where('active','==',true)
    ));
    if(snap.empty){
      document.getElementById('loadingScreen').classList.add('hide');
      document.getElementById('noSession').classList.add('show');
      return;
    }
    var d = snap.docs[0];
    activeSession = Object.assign({id:d.id}, d.data());

    var monthStr = activeSession.month || '';
    var parts = monthStr.split('-');
    var label = parts.length===2 ? parts[0]+'년 '+parseInt(parts[1])+'월' : monthStr;
    document.getElementById('sessionMonth').textContent = label;
    document.getElementById('sessionTitle').textContent = activeSession.title || '산업안전교육';
    document.getElementById('sessionMeta').textContent = '교육일: '+(activeSession.eduDate||'')+(activeSession.instructor ? '  |  강사: '+activeSession.instructor : '');
    document.getElementById('hdrSub').textContent = label+' '+(activeSession.title||'산업안전교육');

    if(activeSession.pdfUrl){
      document.getElementById('pdfFrame').src = activeSession.pdfUrl;
    } else {
      document.querySelector('.pdf-notice').textContent = '⚠️ 교육자료 PDF가 등록되지 않았습니다. 관리자에게 문의하세요.';
    }

    document.getElementById('loadingScreen').classList.add('hide');
    document.getElementById('mainContent').style.display = 'block';
  } catch(e){
    document.getElementById('loadingScreen').classList.add('hide');
    document.getElementById('noSession').classList.add('show');
    console.error(e);
  }
}

window.submitSign = async function(){
  var name = document.getElementById('inpName').value.trim();
  var dept = document.getElementById('inpDept').value.trim();
  var genderEl = document.querySelector('input[name="inpGender"]:checked');
  var gender = genderEl ? genderEl.value : '';
  if(!name){ alert('성명을 입력해 주세요.'); return; }
  if(!dept){ alert('부서를 입력해 주세요.'); return; }
  if(!gender){ alert('성별을 선택해 주세요.'); return; }
  if(!hasSig){ alert('서명란에 서명을 해주세요.'); return; }

  var sigData = canvas.toDataURL('image/png');

  try{
    document.querySelector('.btn-primary').textContent = '제출 중...';
    document.querySelector('.btn-primary').disabled = true;

    await addDoc(collection(db,'safety_signatures'),{
      sessionId: activeSession.id,
      sessionMonth: activeSession.month,
      sessionTitle: activeSession.title,
      worker: name,
      dept: dept,
      gender: gender,
      signatureData: sigData,
      signedAt: Timestamp.now()
    });

    var monthStr = activeSession.month || '';
    var parts = monthStr.split('-');
    var label = parts.length===2 ? parts[0]+'년 '+parseInt(parts[1])+'월' : monthStr;
    document.getElementById('successInfo').innerHTML =
      '<b>'+name+'</b> ('+dept+')<br>'+label+' '+(activeSession.title||'산업안전교육')+'<br>'+
      new Date().toLocaleString('ko-KR');
    document.getElementById('successScreen').classList.add('show');

  } catch(e){
    alert('제출 오류: '+e.message);
    document.querySelector('.btn-primary').textContent = '📩 서명 제출하기';
    document.querySelector('.btn-primary').disabled = false;
  }
};

loadSession();
</script>
</body>
</html>
